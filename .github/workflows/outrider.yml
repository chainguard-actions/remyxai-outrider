name: Outrider

on:
  schedule:
    - cron: '0 14 * * 1'
  workflow_dispatch:

concurrency:
  group: outrider
  cancel-in-progress: false

jobs:
  recommend:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write
    env:
      REMYX_API_KEY: ${{ secrets.REMYX_API_KEY }}
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      # Mint a remyx[bot] token from Remyx so the PR / Issue is authored by
      # the Remyx GitHub App (not github-actions[bot]). The App private key
      # stays on Remyx's side; this uses the REMYX_API_KEY already in secrets.
      # If it can't be minted (e.g. App not installed), the token is empty and
      # the action falls back to the workflow's built-in GITHUB_TOKEN.
      - name: Mint Remyx bot token
        id: remyx-bot
        shell: bash
        env:
          REMYX_API_KEY: ${{ secrets.REMYX_API_KEY }}
          GH_REPOSITORY: ${{ github.repository }}
        run: |
          token="$(curl -sf -X POST             -H "Authorization: Bearer $REMYX_API_KEY"             -H "Content-Type: application/json"             -d "{\"repo\": \"$GH_REPOSITORY\"}"             "https://engine.remyx.ai/api/v1.0/github/installation-token"             | python3 -c "import sys, json; print(json.load(sys.stdin).get('token', ''))")" || token=""
          echo "::add-mask::$token"
          echo "token=$token" >> "$GITHUB_OUTPUT"
      - uses: ./
        with:
          interest-id: '29ca03e7-454d-446c-9941-32c96c53d95d'
          # remyx[bot] token (empty → action falls back to GITHUB_TOKEN).
          github-token: ${{ steps.remyx-bot.outputs.token }}
