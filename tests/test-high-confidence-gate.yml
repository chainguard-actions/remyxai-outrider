name: Test recommend mode with high confidence gate
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    env:
      GITHUB_REF: refs/heads/main
      GITHUB_EVENT_NAME: push
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - id: action
        uses: .
        with:
          interest-id: 'fake-interest-id-for-testing'
          mode: 'recommend'
          min-confidence: 'high'
          draft-mode: 'never'
          rate-limit-days: '0'
          lookback: 'today'
          candidate-pool: '5'
          claude-timeout: '60'
        continue-on-error: true

      - name: Assert status output is set
        env:
          ACTUAL: ${{ steps.action.outputs.status }}
        run: |
          echo "actual status: $ACTUAL"
          if [ -z "$ACTUAL" ]; then
            echo "FAIL: expected status output to be set, got empty string"
            exit 1
          fi
          echo "PASS: status='$ACTUAL'"

      - name: Assert status is a known terminal value
        env:
          ACTUAL: ${{ steps.action.outputs.status }}
        run: |
          echo "actual status: $ACTUAL"
          case "$ACTUAL" in
            error|skipped_rate_limit|skipped_low_confidence|skipped_pr_exists|skipped_issue_exists|pr_opened|pr_opened_draft|issue_opened|claude_failed|rejected_path_violations|skipped_test_failure)
              echo "PASS: status '$ACTUAL' is a known terminal value"
              ;;
            *)
              echo "FAIL: status '$ACTUAL' is not a recognized terminal value"
              exit 1
              ;;
          esac
