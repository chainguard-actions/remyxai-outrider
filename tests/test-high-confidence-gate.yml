name: Test recommend mode with high confidence gate
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    env:
      GITHUB_REF: refs/heads/main
      GITHUB_EVENT_NAME: push
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - id: action
        uses: .
        continue-on-error: true
        with:
          interest-id: 'test-interest-id-00000000-0000-0000-0000-000000000000'
          mode: recommend
          min-confidence: 'high'
          chain: 'false'
          rate-limit-days: '0'
          enable-cocoindex: 'false'
        env:
          REMYX_API_KEY: 'fake-api-key-for-testing'

      - name: Assert action ran and produced a recognizable outcome
        env:
          ACTUAL: ${{ steps.action.outputs.status }}
          OUTCOME: ${{ steps.action.outcome }}
        run: |
          echo "action outcome: $OUTCOME"
          echo "actual status: $ACTUAL"
          # The action requires real external services (engine.remyx.ai, Anthropic).
          # With fake credentials it will either set status to a known error/skip
          # value, or fail before reaching the output-setting step (status empty).
          # Both are acceptable in a test environment.
          if [ "$OUTCOME" = "cancelled" ]; then
            echo "FAIL: action was cancelled unexpectedly"
            exit 1
          fi
          echo "PASS: action ran with outcome=$OUTCOME status=$ACTUAL"

      - name: Assert status is a known value when set
        env:
          ACTUAL: ${{ steps.action.outputs.status }}
        run: |
          echo "actual status: $ACTUAL"
          # If status is empty the action failed before setting it — acceptable
          # with fake credentials in a test environment.
          if [ -z "$ACTUAL" ]; then
            echo "PASS: status not set (action failed before output step — expected with fake credentials)"
            exit 0
          fi
          # With min-confidence=high, low/moderate papers are skipped.
          # Acceptable statuses include skipped_low_confidence plus all error paths.
          KNOWN_STATUSES="pr_opened pr_opened_draft issue_opened skipped_low_confidence skipped_open_artifact skipped_issues_disabled skipped_pr_exists skipped_issue_exists skipped_test_failure claude_failed skipped_no_method_match rejected_path_violations aborted_secret_in_payload error"
          for s in $KNOWN_STATUSES; do
            if [ "$ACTUAL" = "$s" ]; then
              echo "PASS: status '$ACTUAL' is a known value"
              exit 0
            fi
          done
          echo "FAIL: status '$ACTUAL' is not a recognized status value"
          exit 1
