name: Test fidelity mode
on:
  workflow_dispatch:

jobs:
  test-fidelity-mode:
    runs-on: ubuntu-latest
    env:
      GITHUB_REF: refs/pull/1/merge
      GITHUB_EVENT_NAME: pull_request
      GITHUB_HEAD_REF: feature-branch
      GITHUB_BASE_REF: main
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - id: action
        uses: .
        with:
          interest-id: 'test-interest-id-00000000-0000-0000-0000-000000000000'
          mode: 'fidelity'
          pr-number: '1'
          enable-cocoindex: 'false'
        env:
          REMYX_API_KEY: 'test-invalid-key'
        continue-on-error: true

      - name: Assert action step completed (pass or fail)
        env:
          OUTCOME: ${{ steps.action.outcome }}
        run: |
          echo "action outcome: $OUTCOME"
          if [ "$OUTCOME" = "success" ] || [ "$OUTCOME" = "failure" ]; then
            echo "PASS: action step completed with outcome '$OUTCOME'"
          else
            echo "FAIL: unexpected outcome '$OUTCOME'"
            exit 1
          fi

      - name: Assert status output is valid if set
        env:
          STATUS: ${{ steps.action.outputs.status }}
        run: |
          echo "status: '$STATUS'"
          if [ -z "$STATUS" ]; then
            echo "PASS: status is empty (action failed during setup with invalid credentials — expected)"
          else
            case "$STATUS" in
              pr_opened|pr_opened_draft|issue_opened|\
              skipped_low_confidence|skipped_open_artifact|\
              skipped_issues_disabled|skipped_pr_exists|\
              skipped_issue_exists|skipped_test_failure|\
              claude_failed|skipped_no_method_match|\
              rejected_path_violations|aborted_secret_in_payload|\
              error)
                echo "PASS: fidelity mode returned known status '$STATUS'"
                ;;
              *)
                echo "FAIL: fidelity mode returned unrecognized status '$STATUS'"
                exit 1
                ;;
            esac
          fi
