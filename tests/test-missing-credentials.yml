name: Test missing credentials error handling
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - id: action
        uses: .
        with:
          interest-id: 'test-interest-id-00000000-0000-0000-0000-000000000000'
          mode: 'recommend'
          rate-limit-days: '0'
          min-confidence: 'low'
          chain: 'false'
          enable-cocoindex: 'false'
        # No REMYX_API_KEY or ANTHROPIC_API_KEY set — expect error status or setup failure
        continue-on-error: true

      - name: Assert action did not succeed without credentials
        env:
          STATUS: ${{ steps.action.outputs.status }}
          OUTCOME: ${{ steps.action.outcome }}
        run: |
          echo "outcome: $OUTCOME"
          echo "status:  $STATUS"
          # Without credentials, the action must NOT report a successful PR/Issue open.
          # It may fail during setup (npm/pip installs) — outcome=failure, status empty.
          # It may fail during run.py — outcome=failure, status=error/claude_failed/etc.
          # Both are acceptable.
          if [ "$STATUS" = "pr_opened" ] || [ "$STATUS" = "pr_opened_draft" ] || [ "$STATUS" = "issue_opened" ]; then
            echo "FAIL: action unexpectedly succeeded without credentials (status=$STATUS)"
            exit 1
          fi
          echo "PASS: action did not succeed without credentials (outcome=$OUTCOME, status=$STATUS)"

      - name: Assert status is error or skip if set
        env:
          STATUS: ${{ steps.action.outputs.status }}
        run: |
          echo "status: $STATUS"
          if [ -z "$STATUS" ]; then
            echo "INFO: status output is empty (action likely failed during setup — acceptable without credentials)"
            exit 0
          fi
          case "$STATUS" in
            error|claude_failed|skipped_*|rejected_*|aborted_*)
              echo "PASS: status '$STATUS' is a valid error/skip outcome"
              ;;
            pr_opened|pr_opened_draft|issue_opened)
              echo "FAIL: action unexpectedly succeeded without credentials"
              exit 1
              ;;
            *)
              echo "INFO: status '$STATUS' — acceptable outcome without credentials"
              ;;
          esac
