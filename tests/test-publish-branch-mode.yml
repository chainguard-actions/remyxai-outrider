name: Test recommend mode with publish=branch
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - id: action
        uses: .
        continue-on-error: true
        with:
          interest-id: 'test-interest-id-placeholder'
          mode: 'recommend'
          publish: 'branch'
          chain: 'false'
          rate-limit-days: '0'
          min-confidence: 'high'
          enable-cocoindex: 'false'
        env:
          REMYX_API_KEY: 'test-invalid-key'

      - name: Assert runner reached assertion step
        env:
          STATUS: ${{ steps.action.outputs.status }}
          OUTCOME: ${{ steps.action.outcome }}
        run: |
          echo "action outcome: $OUTCOME"
          echo "status output: $STATUS"
          # The action should complete (success or failure) without crashing the runner.
          # With an invalid API key, we expect an error status or a non-zero exit.
          # The important thing is that the runner continues past the action step.
          echo "PASS: runner reached assertion step"
          # If status is set, verify it's a known value
          if [ -n "$STATUS" ]; then
            case "$STATUS" in
              pr_opened|pr_opened_draft|issue_opened|\
              skipped_low_confidence|skipped_open_artifact|\
              skipped_issues_disabled|skipped_pr_exists|\
              skipped_issue_exists|skipped_test_failure|\
              claude_failed|skipped_no_method_match|\
              rejected_path_violations|aborted_secret_in_payload|\
              error|weekly_summary_posted|\
              weekly_summary_skipped_no_discussion_id|\
              weekly_summary_failed)
                echo "PASS: status '$STATUS' is a known valid status value"
                ;;
              *)
                echo "WARN: status '$STATUS' is not in the known status list (may be a new status)"
                ;;
            esac
          fi
