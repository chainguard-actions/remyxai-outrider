name: Test recommend mode with publish=branch
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - id: action
        uses: .
        with:
          interest-id: 'test-interest-id-00000000-0000-0000-0000-000000000000'
          mode: 'recommend'
          chain: 'false'
          min-confidence: 'low'
          rate-limit-days: '0'
          lookback: 'week'
          candidate-pool: '5'
          enable-cocoindex: 'false'
          publish: 'branch'
          draft-mode: 'never'
        env:
          REMYX_API_KEY: 'test-invalid-key'
          ANTHROPIC_API_KEY: 'test-invalid-key'
        continue-on-error: true

      - name: Assert status output is set or action failed gracefully
        env:
          STATUS: ${{ steps.action.outputs.status }}
          OUTCOME: ${{ steps.action.outcome }}
        run: |
          echo "outcome: $OUTCOME"
          echo "status: $STATUS"
          # With invalid API keys the action may fail before setting outputs.
          # Accept either: status is set to a known value, OR action failed
          # (outcome=failure) which means setup/run.py errored with bad creds.
          if [ "$OUTCOME" = "failure" ]; then
            echo "PASS: action failed as expected with invalid credentials"
            exit 0
          fi
          # If action succeeded or was skipped, status must be set
          if [ -z "$STATUS" ]; then
            echo "FAIL: action did not fail but status output is empty"
            exit 1
          fi
          echo "PASS: status is set to '$STATUS'"

      - name: Assert status is a known value (when set)
        env:
          STATUS: ${{ steps.action.outputs.status }}
          OUTCOME: ${{ steps.action.outcome }}
        run: |
          echo "outcome: $OUTCOME"
          echo "status: $STATUS"
          # Only validate status value if the action didn't fail entirely
          if [ "$OUTCOME" = "failure" ] || [ -z "$STATUS" ]; then
            echo "PASS: skipping status value check (action failed with invalid creds)"
            exit 0
          fi
          case "$STATUS" in
            pr_opened|pr_opened_draft|issue_opened|\
            skipped_low_confidence|skipped_open_artifact|\
            skipped_issues_disabled|skipped_pr_exists|\
            skipped_issue_exists|skipped_test_failure|\
            claude_failed|skipped_no_method_match|\
            rejected_path_violations|aborted_secret_in_payload|\
            error)
              echo "PASS: status '$STATUS' is a known value"
              ;;
            *)
              echo "FAIL: status '$STATUS' is not a recognized value"
              exit 1
              ;;
          esac

      - name: Assert pr_url is empty when publish=branch (when action succeeded)
        env:
          PR_URL: ${{ steps.action.outputs.pr_url }}
          STATUS: ${{ steps.action.outputs.status }}
          OUTCOME: ${{ steps.action.outcome }}
        run: |
          echo "outcome: $OUTCOME"
          echo "pr_url: $PR_URL"
          echo "status: $STATUS"
          # Only check this constraint when the action ran successfully
          if [ "$OUTCOME" = "failure" ] || [ -z "$STATUS" ]; then
            echo "PASS: skipping pr_url check (action failed with invalid creds)"
            exit 0
          fi
          # When publish=branch, no PR is opened so pr_url should be empty
          if [ "$STATUS" = "pr_opened" ] || [ "$STATUS" = "pr_opened_draft" ]; then
            echo "FAIL: status indicates PR was opened but publish=branch was set"
            exit 1
          fi
          echo "PASS: no PR opened as expected with publish=branch"
