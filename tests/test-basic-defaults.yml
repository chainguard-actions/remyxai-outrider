name: Test basic invocation with default inputs
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - id: action
        uses: .
        with:
          interest-id: 'test-interest-00000000-0000-0000-0000-000000000000'
          # All other inputs use defaults:
          # mode: recommend
          # chain: true
          # min-confidence: moderate
          # draft-mode: always
          # rate-limit-days: 7
          # lookback: week
          # candidate-pool: 25
          # enable-cocoindex: true (skip to speed up test)
          enable-cocoindex: 'false'
          chain: 'false'
          rate-limit-days: '0'
        env:
          REMYX_API_KEY: ''
        continue-on-error: true

      - name: Assert action step ran (setup steps completed)
        run: |
          echo "PASS: action step ran (setup steps completed even without API key)"

      - name: Assert outputs are defined (even if empty)
        env:
          STATUS: ${{ steps.action.outputs.status }}
          ARXIV: ${{ steps.action.outputs.arxiv }}
          TIER: ${{ steps.action.outputs.tier }}
        run: |
          echo "status: '$STATUS'"
          echo "arxiv: '$ARXIV'"
          echo "tier: '$TIER'"
          # The action should have run and either set a status or failed gracefully.
          # We just verify the step completed (continue-on-error handles failures).
          echo "PASS: output values captured"
