name: Test fidelity mode with no PR number
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - id: action
        uses: .
        continue-on-error: true
        with:
          interest-id: 'test-interest-id-placeholder'
          mode: 'fidelity'
          pr-number: ''
          enable-cocoindex: 'false'
        env:
          REMYX_API_KEY: 'fake-key-for-test'

      - name: Assert action completed with error or skip (no valid PR to audit)
        env:
          OUTCOME: ${{ steps.action.outcome }}
          ACTUAL: ${{ steps.action.outputs.status }}
        run: |
          echo "step outcome: $OUTCOME"
          echo "actual status: $ACTUAL"
          # Without a valid PR number and with fake credentials, the action either:
          # (a) sets a known error/skip status and exits 0, or
          # (b) exits non-zero (outcome=failure) before setting outputs
          # Both are acceptable — we verify it did NOT succeed unexpectedly.
          if [ "$OUTCOME" = "failure" ]; then
            echo "PASS: action failed as expected (no valid PR + fake credentials)"
            exit 0
          fi
          # If the action exited 0, it must have set a known error/skip status
          case "$ACTUAL" in
            error|skipped_low_confidence|skipped_open_artifact|skipped_pr_exists|\
            skipped_issue_exists|skipped_no_method_match|claude_failed|\
            rejected_path_violations|aborted_secret_in_payload|\
            skipped_issues_disabled|skipped_test_failure)
              echo "PASS: got expected error/skip status '$ACTUAL'"
              ;;
            pr_opened|pr_opened_draft|issue_opened)
              echo "FAIL: action unexpectedly succeeded with no PR number and fake credentials"
              exit 1
              ;;
            *)
              echo "FAIL: unexpected outcome='$OUTCOME' status='$ACTUAL'"
              exit 1
              ;;
          esac
