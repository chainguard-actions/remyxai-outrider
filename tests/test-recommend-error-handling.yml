name: Test recommend mode error handling with invalid credentials
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - id: action
        uses: .
        continue-on-error: true
        with:
          interest-id: 'invalid-interest-id-for-testing'
          mode: 'recommend'
          rate-limit-days: '0'
          min-confidence: 'high'
          enable-cocoindex: 'false'
          chain: 'false'
        env:
          REMYX_API_KEY: 'fake-key-for-test'

      - name: Assert action completed (either with output or as a failed step)
        env:
          OUTCOME: ${{ steps.action.outcome }}
          ACTUAL: ${{ steps.action.outputs.status }}
        run: |
          echo "step outcome: $OUTCOME"
          echo "actual status: $ACTUAL"
          # With invalid credentials, the action either:
          # (a) sets a known error/skip status and exits 0, or
          # (b) exits non-zero (outcome=failure) before setting outputs
          # Both are acceptable — we just verify the step ran and produced
          # a deterministic result (not a surprise success).
          if [ "$OUTCOME" = "failure" ]; then
            echo "PASS: action failed as expected with invalid credentials"
            exit 0
          fi
          # If the action exited 0, it must have set a known status
          case "$ACTUAL" in
            error|skipped_low_confidence|skipped_open_artifact|skipped_pr_exists|\
            skipped_issue_exists|skipped_no_method_match|claude_failed|\
            rejected_path_violations|aborted_secret_in_payload|\
            skipped_issues_disabled|skipped_test_failure)
              echo "PASS: got expected error/skip status '$ACTUAL'"
              ;;
            pr_opened|pr_opened_draft|issue_opened)
              echo "FAIL: action unexpectedly succeeded with fake credentials"
              exit 1
              ;;
            *)
              echo "FAIL: unexpected outcome='$OUTCOME' status='$ACTUAL'"
              exit 1
              ;;
          esac
