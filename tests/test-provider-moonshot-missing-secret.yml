name: Test provider=moonshot fails when MOONSHOT_API_KEY is missing
on:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    # provider=moonshot requires MOONSHOT_API_KEY in the env block.
    # Without it, the Configure backend step should exit 1.
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - id: action
        uses: .
        continue-on-error: true
        with:
          interest-id: 'test-interest-id'
          provider: 'moonshot'
        # MOONSHOT_API_KEY intentionally NOT set — action must fail cleanly

      - name: Assert action failed due to missing MOONSHOT_API_KEY
        env:
          OUTCOME: ${{ steps.action.outcome }}
        run: |
          echo "outcome: $OUTCOME"
          if [ "$OUTCOME" != "failure" ]; then
            echo "FAIL: expected action to fail when MOONSHOT_API_KEY is missing, but got outcome='$OUTCOME'"
            exit 1
          fi
          echo "PASS: action correctly failed for missing MOONSHOT_API_KEY"
