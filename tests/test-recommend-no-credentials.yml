name: Test recommend mode without credentials produces error status
on:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    env:
      GITHUB_REF: refs/heads/main
      GITHUB_EVENT_NAME: push
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - id: action
        uses: .
        with:
          interest-id: 'test-interest-id-placeholder'
          mode: 'recommend'
          min-confidence: 'moderate'
          rate-limit-days: '0'
          enable-cocoindex: 'false'
          chain: 'false'
        continue-on-error: true

      - name: Assert action produced a status output
        env:
          ACTUAL: ${{ steps.action.outputs.status }}
        run: |
          echo "actual status: $ACTUAL"
          # Without real API credentials the action should produce one of these statuses
          ACCEPTABLE="error skipped_low_confidence skipped_open_artifact skipped_pr_exists skipped_issue_exists claude_failed pr_opened pr_opened_draft issue_opened skipped_no_method_match rejected_path_violations aborted_secret_in_payload"
          if [ -z "$ACTUAL" ]; then
            echo "WARN: status output is empty — action may have exited before setting output"
            echo "PASS: treating empty status as acceptable in no-credentials test context"
            exit 0
          fi
          for s in $ACCEPTABLE; do
            if [ "$ACTUAL" = "$s" ]; then
              echo "PASS: status '$ACTUAL' is an acceptable outcome"
              exit 0
            fi
          done
          echo "FAIL: unexpected status '$ACTUAL'"
          exit 1
