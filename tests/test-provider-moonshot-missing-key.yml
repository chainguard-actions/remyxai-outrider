name: Test provider moonshot without MOONSHOT_API_KEY fails
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Run action with provider=moonshot but no MOONSHOT_API_KEY (expect failure)
        id: action
        uses: .
        continue-on-error: true
        with:
          interest-id: 'test-interest-id-placeholder'
          provider: 'moonshot'
        # Intentionally NOT setting MOONSHOT_API_KEY to trigger the validation error

      - name: Assert action failed due to missing MOONSHOT_API_KEY
        run: |
          echo "outcome: ${{ steps.action.outcome }}"
          if [ "${{ steps.action.outcome }}" != "failure" ]; then
            echo "FAIL: expected action to fail when provider=moonshot without MOONSHOT_API_KEY, but outcome was ${{ steps.action.outcome }}"
            exit 1
          fi
          echo "PASS: action correctly failed with missing MOONSHOT_API_KEY for moonshot provider"
