name: Test unknown provider fails with clear error
on:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    # We expect the action to fail (exit 1) when an unknown provider is given.
    # Use continue-on-error on the action step and assert the outcome.
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - id: action
        uses: .
        continue-on-error: true
        with:
          interest-id: 'test-interest-id'
          provider: 'invalid-provider'
        env:
          REMYX_API_KEY: 'fake-key-for-provider-test'

      - name: Assert action failed due to unknown provider
        env:
          OUTCOME: ${{ steps.action.outcome }}
        run: |
          echo "outcome: $OUTCOME"
          if [ "$OUTCOME" != "failure" ]; then
            echo "FAIL: expected action to fail with unknown provider, but got outcome='$OUTCOME'"
            exit 1
          fi
          echo "PASS: action correctly failed for unknown provider"
