name: Test recommend mode with no API key produces error status
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    env:
      GITHUB_REF: refs/heads/main
      GITHUB_EVENT_NAME: push
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - id: action
        uses: .
        with:
          interest-id: 'test-interest-id-placeholder'
          mode: 'recommend'
          min-confidence: 'moderate'
          draft-mode: 'always'
          rate-limit-days: '7'
        env:
          REMYX_API_KEY: ''
        continue-on-error: true

      - name: Assert action produced a status output
        env:
          ACTUAL: ${{ steps.action.outputs.status }}
        run: |
          echo "actual status: $ACTUAL"
          if [ -z "$ACTUAL" ]; then
            echo "FAIL: expected a non-empty status output"
            exit 1
          fi
          echo "PASS: got status '$ACTUAL'"

      - name: Assert status is a known terminal value
        env:
          ACTUAL: ${{ steps.action.outputs.status }}
        run: |
          echo "actual status: $ACTUAL"
          case "$ACTUAL" in
            error|skipped_low_confidence|skipped_open_artifact|skipped_issues_disabled|skipped_pr_exists|skipped_issue_exists|skipped_test_failure|claude_failed|rejected_path_violations|aborted_secret_in_payload|pr_opened|pr_opened_draft|issue_opened)
              echo "PASS: status '$ACTUAL' is a known terminal value"
              ;;
            *)
              echo "FAIL: status '$ACTUAL' is not a recognized terminal value"
              exit 1
              ;;
          esac
