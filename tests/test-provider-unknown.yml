name: Test provider unknown value fails
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Run action with unknown provider (expect failure)
        id: action
        uses: .
        continue-on-error: true
        with:
          interest-id: 'test-interest-id-placeholder'
          provider: 'unknown-provider'
        env:
          ANTHROPIC_API_KEY: 'fake-key-for-provider-test'

      - name: Assert action failed due to unknown provider
        run: |
          echo "outcome: ${{ steps.action.outcome }}"
          if [ "${{ steps.action.outcome }}" != "failure" ]; then
            echo "FAIL: expected action to fail with unknown provider, but outcome was ${{ steps.action.outcome }}"
            exit 1
          fi
          echo "PASS: action correctly failed with unknown provider"
