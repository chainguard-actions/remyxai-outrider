name: Test provider=custom fails when model-base-url is missing
on:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    # provider=custom requires model-base-url to be set.
    # Without it, the Configure backend step should exit 1.
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - id: action
        uses: .
        continue-on-error: true
        with:
          interest-id: 'test-interest-id'
          provider: 'custom'
          # model-base-url intentionally NOT set — action must fail cleanly

      - name: Assert action failed due to missing model-base-url
        env:
          OUTCOME: ${{ steps.action.outcome }}
        run: |
          echo "outcome: $OUTCOME"
          if [ "$OUTCOME" != "failure" ]; then
            echo "FAIL: expected action to fail when model-base-url is missing for provider=custom, but got outcome='$OUTCOME'"
            exit 1
          fi
          echo "PASS: action correctly failed for missing model-base-url with provider=custom"
