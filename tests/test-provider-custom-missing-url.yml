name: Test provider custom without model-base-url fails
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Run action with provider=custom but no model-base-url (expect failure)
        id: action
        uses: .
        continue-on-error: true
        with:
          interest-id: 'test-interest-id-placeholder'
          provider: 'custom'
          # model-base-url intentionally omitted to trigger validation error
        env:
          ANTHROPIC_API_KEY: 'fake-key-for-provider-test'

      - name: Assert action failed due to missing model-base-url for custom provider
        run: |
          echo "outcome: ${{ steps.action.outcome }}"
          if [ "${{ steps.action.outcome }}" != "failure" ]; then
            echo "FAIL: expected action to fail when provider=custom without model-base-url, but outcome was ${{ steps.action.outcome }}"
            exit 1
          fi
          echo "PASS: action correctly failed with missing model-base-url for custom provider"
