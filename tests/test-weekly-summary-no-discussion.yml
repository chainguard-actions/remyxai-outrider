name: Test weekly-summary mode with no discussion ID
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - id: action
        uses: .
        with:
          interest-id: 'test-interest-id-00000000-0000-0000-0000-000000000000'
          mode: 'weekly-summary'
          weekly-discussion-id: ''
          enable-cocoindex: 'false'
        # weekly-discussion-id is empty — should skip cleanly or fail without credentials
        continue-on-error: true

      - name: Assert action did not post a summary without a discussion ID
        env:
          STATUS: ${{ steps.action.outputs.status }}
          OUTCOME: ${{ steps.action.outcome }}
        run: |
          echo "outcome: $OUTCOME"
          echo "status:  $STATUS"
          # Without a discussion ID, the action must NOT report weekly_summary_posted.
          # It may fail during setup (npm/pip installs) — outcome=failure, status empty.
          # It may skip cleanly — status=weekly_summary_skipped_no_discussion_id.
          # Both are acceptable.
          if [ "$STATUS" = "weekly_summary_posted" ]; then
            echo "FAIL: action unexpectedly posted a summary without a discussion ID"
            exit 1
          fi
          echo "PASS: action did not post a summary without a discussion ID (outcome=$OUTCOME, status=$STATUS)"

      - name: Assert status is skip or error if set
        env:
          STATUS: ${{ steps.action.outputs.status }}
        run: |
          echo "status: $STATUS"
          if [ -z "$STATUS" ]; then
            echo "INFO: status output is empty (action likely failed during setup — acceptable without credentials)"
            exit 0
          fi
          case "$STATUS" in
            weekly_summary_skipped_no_discussion_id|weekly_summary_skipped*|error|claude_failed)
              echo "PASS: status '$STATUS' is expected for weekly-summary with no discussion ID"
              ;;
            weekly_summary_posted)
              echo "FAIL: action unexpectedly posted a summary without a discussion ID"
              exit 1
              ;;
            *)
              echo "INFO: status '$STATUS' — acceptable outcome"
              ;;
          esac
