name: Test weekly-summary mode with no discussion ID
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    env:
      GITHUB_REF: refs/heads/main
      GITHUB_EVENT_NAME: push
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - id: action
        uses: .
        with:
          interest-id: 'test-interest-id-00000000-0000-0000-0000-000000000000'
          mode: 'weekly-summary'
          weekly-discussion-id: ''
        continue-on-error: true

      - name: Assert status is weekly_summary_skipped_no_discussion_id
        env:
          STATUS: ${{ steps.action.outputs.status }}
        run: |
          echo "status: $STATUS"
          if [ "$STATUS" != "weekly_summary_skipped_no_discussion_id" ]; then
            echo "FAIL: expected 'weekly_summary_skipped_no_discussion_id', got '$STATUS'"
            exit 1
          fi
          echo "PASS: status=$STATUS"
