name: Test weekly-summary mode with no discussion ID
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - id: action
        uses: .
        continue-on-error: true
        with:
          interest-id: 'test-interest-id-placeholder'
          mode: 'weekly-summary'
          weekly-discussion-id: ''
          enable-cocoindex: 'false'
        env:
          REMYX_API_KEY: 'fake-key-for-test'

      - name: Assert action handled missing discussion ID gracefully
        env:
          OUTCOME: ${{ steps.action.outcome }}
          ACTUAL: ${{ steps.action.outputs.status }}
        run: |
          echo "step outcome: $OUTCOME"
          echo "actual status: $ACTUAL"
          # With no discussion ID and fake credentials, the action either:
          # (a) sets weekly_summary_skipped_no_discussion_id and exits 0, or
          # (b) sets weekly_summary_failed and exits 0 (or non-zero), or
          # (c) exits non-zero (outcome=failure) before setting outputs
          # All are acceptable — we verify it did NOT post a summary unexpectedly.
          if [ "$OUTCOME" = "failure" ]; then
            echo "PASS: action failed as expected (no discussion ID + fake credentials)"
            exit 0
          fi
          case "$ACTUAL" in
            weekly_summary_skipped_no_discussion_id)
              echo "PASS: got expected skip status '$ACTUAL'"
              ;;
            weekly_summary_failed|error)
              echo "PASS: got acceptable failure status '$ACTUAL'"
              ;;
            weekly_summary_posted)
              echo "FAIL: action unexpectedly posted a weekly summary with no discussion ID"
              exit 1
              ;;
            *)
              echo "FAIL: unexpected outcome='$OUTCOME' status='$ACTUAL'"
              exit 1
              ;;
          esac
