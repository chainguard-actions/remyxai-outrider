name: Test weekly-summary mode with no discussion ID
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    env:
      GITHUB_REF: refs/heads/main
      GITHUB_EVENT_NAME: push
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - id: action
        uses: .
        with:
          interest-id: 'test-interest-id-00000000-0000-0000-0000-000000000000'
          mode: 'weekly-summary'
          weekly-discussion-id: ''
        env:
          REMYX_API_KEY: 'test-invalid-key'
        continue-on-error: true

      - name: Assert status is weekly_summary_skipped_no_discussion_id or error
        env:
          ACTUAL: ${{ steps.action.outputs.status }}
        run: |
          echo "actual status: $ACTUAL"
          if [ -z "$ACTUAL" ]; then
            echo "FAIL: expected status output to be non-empty"
            exit 1
          fi
          # When weekly-discussion-id is empty, the action should skip cleanly
          # or return an error (if API key is invalid before reaching that check)
          if [ "$ACTUAL" = "weekly_summary_skipped_no_discussion_id" ] || \
             [ "$ACTUAL" = "error" ] || \
             [ "$ACTUAL" = "weekly_summary_failed" ]; then
            echo "PASS: status is '$ACTUAL' (expected for missing discussion ID or invalid API key)"
          else
            echo "FAIL: unexpected status '$ACTUAL'"
            exit 1
          fi
