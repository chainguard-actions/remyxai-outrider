name: Test weekly-summary mode with no discussion ID
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - id: action
        uses: .
        with:
          interest-id: 'test-interest-id-00000000-0000-0000-0000-000000000000'
          mode: 'weekly-summary'
          weekly-discussion-id: ''
          enable-cocoindex: 'false'
        env:
          REMYX_API_KEY: 'test-invalid-key'
          ANTHROPIC_API_KEY: 'test-invalid-key'
        continue-on-error: true

      - name: Assert status output is set or action failed gracefully
        env:
          STATUS: ${{ steps.action.outputs.status }}
          OUTCOME: ${{ steps.action.outcome }}
        run: |
          echo "outcome: $OUTCOME"
          echo "status: $STATUS"
          # With invalid API keys the action may fail before setting outputs.
          # Accept either: status is set to a known value, OR action failed
          # (outcome=failure) which means setup/run.py errored with bad creds.
          if [ "$OUTCOME" = "failure" ]; then
            echo "PASS: action failed as expected with invalid credentials"
            exit 0
          fi
          # If action succeeded or was skipped, status must be set
          if [ -z "$STATUS" ]; then
            echo "FAIL: action did not fail but status output is empty"
            exit 1
          fi
          echo "PASS: status is set to '$STATUS'"

      - name: Assert status indicates skipped or known outcome (when set)
        env:
          STATUS: ${{ steps.action.outputs.status }}
          OUTCOME: ${{ steps.action.outcome }}
        run: |
          echo "outcome: $OUTCOME"
          echo "status: $STATUS"
          # Only validate status value if the action didn't fail entirely
          if [ "$OUTCOME" = "failure" ] || [ -z "$STATUS" ]; then
            echo "PASS: skipping status value check (action failed with invalid creds)"
            exit 0
          fi
          case "$STATUS" in
            weekly_summary_posted|\
            weekly_summary_skipped_no_discussion_id|\
            weekly_summary_failed|\
            error)
              echo "PASS: status '$STATUS' is a known weekly-summary value"
              ;;
            *)
              echo "FAIL: unexpected status '$STATUS' for weekly-summary mode"
              exit 1
              ;;
          esac
