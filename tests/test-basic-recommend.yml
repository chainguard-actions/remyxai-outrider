name: Test basic recommend mode
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - id: action
        uses: .
        with:
          interest-id: 'test-interest-id-00000000-0000-0000-0000-000000000000'
          mode: 'recommend'
          chain: 'false'
          rate-limit-days: '0'
          min-confidence: 'low'
          enable-cocoindex: 'false'
        continue-on-error: true

      - name: Assert status output is set or action errored without API keys
        env:
          STATUS: ${{ steps.action.outputs.status }}
        run: |
          echo "status: '$STATUS'"
          # Without REMYX_API_KEY / ANTHROPIC_API_KEY the action may crash
          # before setting any output — that is acceptable in the test env.
          if [ -z "$STATUS" ]; then
            echo "INFO: status output is empty (action likely crashed before setting outputs — expected without API keys)"
            echo "PASS: acceptable outcome when API keys are absent"
            exit 0
          fi
          # If a status was set, verify it is a recognised value.
          case "$STATUS" in
            pr_opened|pr_opened_draft|issue_opened|\
            skipped_low_confidence|skipped_open_artifact|\
            skipped_issues_disabled|skipped_pr_exists|\
            skipped_issue_exists|skipped_test_failure|\
            claude_failed|skipped_no_method_match|\
            rejected_path_violations|aborted_secret_in_payload|\
            error)
              echo "PASS: status '$STATUS' is a recognised value"
              ;;
            *)
              echo "FAIL: status '$STATUS' is not a recognised value"
              exit 1
              ;;
          esac
