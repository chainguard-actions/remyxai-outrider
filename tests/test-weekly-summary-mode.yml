name: Test weekly-summary mode (no discussion id)
on:
  workflow_dispatch:

jobs:
  test-weekly-summary-mode:
    runs-on: ubuntu-latest
    env:
      GITHUB_REF: refs/heads/main
      GITHUB_EVENT_NAME: schedule
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - id: action
        uses: .
        with:
          interest-id: 'test-interest-id-00000000-0000-0000-0000-000000000000'
          mode: 'weekly-summary'
          weekly-discussion-id: ''
          enable-cocoindex: 'false'
        continue-on-error: true

      - name: Assert action step completed (status set or action errored gracefully)
        env:
          STATUS: ${{ steps.action.outputs.status }}
          OUTCOME: ${{ steps.action.outcome }}
        run: |
          echo "outcome: $OUTCOME"
          echo "status: $STATUS"
          # The action requires REMYX_API_KEY which is not set in test env.
          # It is acceptable for the action to fail/error without credentials.
          if [ "$OUTCOME" = "success" ] || [ "$OUTCOME" = "failure" ]; then
            echo "PASS: action step completed with outcome '$OUTCOME'"
          else
            echo "FAIL: unexpected outcome '$OUTCOME'"
            exit 1
          fi

      - name: Assert status is a weekly-summary recognized value or empty (no credentials)
        env:
          STATUS: ${{ steps.action.outputs.status }}
        run: |
          echo "status: $STATUS"
          # Empty status is acceptable when API credentials are absent
          if [ -z "$STATUS" ]; then
            echo "PASS: status is empty (expected without API credentials)"
            exit 0
          fi
          case "$STATUS" in
            weekly_summary_posted|\
            weekly_summary_skipped_no_discussion_id|\
            weekly_summary_failed|\
            error)
              echo "PASS: status '$STATUS' is a recognized weekly-summary value"
              ;;
            *)
              echo "FAIL: status '$STATUS' is not a recognized weekly-summary value"
              exit 1
              ;;
          esac
