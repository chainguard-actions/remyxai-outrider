name: Test weekly-summary mode
on:
  workflow_dispatch:

jobs:
  test-weekly-summary-mode:
    runs-on: ubuntu-latest
    env:
      GITHUB_REF: refs/heads/main
      GITHUB_EVENT_NAME: schedule
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - id: action
        uses: .
        with:
          interest-id: 'test-interest-id-00000000-0000-0000-0000-000000000000'
          mode: 'weekly-summary'
          weekly-discussion-id: ''
          enable-cocoindex: 'false'
        env:
          REMYX_API_KEY: 'test-invalid-key'
        continue-on-error: true

      - name: Assert action step completed (pass or fail)
        env:
          OUTCOME: ${{ steps.action.outcome }}
        run: |
          echo "action outcome: $OUTCOME"
          if [ "$OUTCOME" = "success" ] || [ "$OUTCOME" = "failure" ]; then
            echo "PASS: action step completed with outcome '$OUTCOME'"
          else
            echo "FAIL: unexpected outcome '$OUTCOME'"
            exit 1
          fi

      - name: Assert status output is valid if set
        env:
          STATUS: ${{ steps.action.outputs.status }}
        run: |
          echo "status: '$STATUS'"
          if [ -z "$STATUS" ]; then
            echo "PASS: status is empty (action failed during setup with invalid credentials — expected)"
          else
            case "$STATUS" in
              weekly_summary_posted|\
              weekly_summary_skipped_no_discussion_id|\
              weekly_summary_failed|\
              error)
                echo "PASS: weekly-summary mode returned expected status '$STATUS'"
                ;;
              *)
                echo "FAIL: weekly-summary mode returned unexpected status '$STATUS'"
                exit 1
                ;;
            esac
          fi
