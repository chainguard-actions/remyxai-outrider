name: Test weekly-summary mode
on:
  workflow_dispatch:

jobs:
  test-weekly-summary-mode:
    runs-on: ubuntu-latest
    env:
      GITHUB_REF: refs/heads/main
      GITHUB_EVENT_NAME: schedule
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - id: action
        uses: .
        continue-on-error: true
        with:
          interest-id: 'test-interest-id-00000000-0000-0000-0000-000000000000'
          mode: 'weekly-summary'
          weekly-discussion-id: ''
          enable-cocoindex: 'false'
        env:
          REMYX_API_KEY: 'dummy-key-for-testing'

      - name: Assert action completed (with or without outputs)
        env:
          STATUS: ${{ steps.action.outputs.status }}
        run: |
          echo "status: '$STATUS'"
          if [ -z "$STATUS" ]; then
            echo "PASS: action ran (status empty — expected with dummy credentials during install/API failure)"
            exit 0
          fi
          case "$STATUS" in
            weekly_summary_posted|\
            weekly_summary_skipped_no_discussion_id|\
            weekly_summary_failed|\
            error)
              echo "PASS: status '$STATUS' is a recognized weekly-summary value"
              ;;
            *)
              echo "FAIL: status '$STATUS' is not a recognized weekly-summary value"
              exit 1
              ;;
          esac
