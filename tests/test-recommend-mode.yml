name: Test recommend mode (basic)
on:
  workflow_dispatch:

jobs:
  test-recommend-mode:
    runs-on: ubuntu-latest
    env:
      GITHUB_REF: refs/heads/main
      GITHUB_EVENT_NAME: push
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - id: action
        uses: .
        with:
          interest-id: 'test-interest-id-00000000-0000-0000-0000-000000000000'
          mode: 'recommend'
          chain: 'false'
          min-confidence: 'moderate'
          rate-limit-days: '0'
          lookback: 'week'
          candidate-pool: '5'
          enable-cocoindex: 'false'
        # The action will fail at the API call stage due to missing REMYX_API_KEY
        continue-on-error: true

      - name: Assert action ran (outputs accessible even if empty)
        env:
          STATUS: ${{ steps.action.outputs.status }}
          PR_URL: ${{ steps.action.outputs.pr_url }}
          ISSUE_URL: ${{ steps.action.outputs.issue_url }}
          ARXIV: ${{ steps.action.outputs.arxiv }}
          TIER: ${{ steps.action.outputs.tier }}
          COST: ${{ steps.action.outputs.cost_usd }}
        run: |
          echo "status: $STATUS"
          echo "pr_url: $PR_URL"
          echo "issue_url: $ISSUE_URL"
          echo "arxiv: $ARXIV"
          echo "tier: $TIER"
          echo "cost_usd: $COST"
          # If status is set, verify it is a known value
          if [ -n "$STATUS" ]; then
            case "$STATUS" in
              pr_opened|pr_opened_draft|issue_opened|\
              skipped_low_confidence|skipped_open_artifact|\
              skipped_issues_disabled|skipped_pr_exists|\
              skipped_issue_exists|skipped_test_failure|\
              claude_failed|skipped_no_method_match|\
              rejected_path_violations|aborted_secret_in_payload|\
              error|weekly_summary_posted|\
              weekly_summary_skipped_no_discussion_id|\
              weekly_summary_failed)
                echo "PASS: status '$STATUS' is a known value"
                ;;
              *)
                echo "FAIL: status '$STATUS' is not a recognized value"
                exit 1
                ;;
            esac
          else
            echo "PASS: action ran (status empty — expected when API key missing)"
          fi
